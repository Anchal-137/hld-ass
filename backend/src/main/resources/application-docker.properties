# =====================================================================
#  DOCKER profile  (activated by SPRING_PROFILES_ACTIVE=docker)
#  Here the 3 logical cache nodes are 3 SEPARATE Redis containers, which is
#  the "true" distributed-cache topology. Service names resolve via the
#  docker-compose network DNS.
# =====================================================================

# Postgres container
spring.datasource.url=jdbc:postgresql://postgres:5432/typeahead
spring.datasource.username=typeahead
spring.datasource.password=typeahead

# Redis used for Streams (batch writes)
spring.data.redis.host=redis-0
spring.data.redis.port=6379

# Three independent Redis nodes -> a genuinely distributed cache ring
cache.nodes=redis-0:6379:0,redis-1:6379:0,redis-2:6379:0
cache.virtual-nodes=150

dataset.load-on-startup=true
dataset.csv-path=classpath:data/queries.csv
