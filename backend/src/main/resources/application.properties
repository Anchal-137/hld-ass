# =====================================================================
#  Search Typeahead System - LOCAL profile (default)
#  Run with a single local Postgres + a single local Redis.
#  The "distributed cache" is modelled as 3 LOGICAL nodes that live on the
#  same Redis instance but on different DB indexes (0,1,2). Consistent
#  hashing still routes each prefix to exactly one logical node, so the
#  consistent-hashing behaviour is fully demonstrable locally.
#  In docker-compose we point the same 3 logical nodes at 3 SEPARATE Redis
#  containers (see application-docker.properties) - zero code change.
# =====================================================================

server.port=8080
spring.application.name=search-typeahead

# ---------------------------------------------------------------------
# PostgreSQL - the durable PRIMARY data store for query-count data
# ---------------------------------------------------------------------
spring.datasource.url=jdbc:postgresql://localhost:5432/typeahead
spring.datasource.username=typeahead
spring.datasource.password=typeahead
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=500
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.show-sql=false

# ---------------------------------------------------------------------
# Redis Streams connection used by the batch-write subsystem.
# (This is the "control plane" Redis; the cache nodes are configured below.)
# ---------------------------------------------------------------------
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ---------------------------------------------------------------------
# Distributed cache nodes (consistent hashing ring members)
# Format per node: host:port:db   (comma separated)
# Locally we use 3 logical nodes = 3 DB indexes on one Redis instance.
# ---------------------------------------------------------------------
cache.nodes=localhost:6379:0,localhost:6379:1,localhost:6379:2
# Virtual nodes per physical node on the hash ring (smooths key distribution)
cache.virtual-nodes=150
# TTL (seconds) for cached prefix->suggestions entries (POPULARITY ranking)
cache.suggest-ttl-seconds=60
# TTL (seconds) for the RECENCY-ranked suggestion cache (shorter -> stays fresh)
cache.recency-suggest-ttl-seconds=15
# TTL (seconds) for the cached trending list
cache.trending-ttl-seconds=30

# ---------------------------------------------------------------------
# Suggestion serving strategy: DB (Postgres prefix index) or TRIE (in-memory)
# ---------------------------------------------------------------------
suggest.source=DB
suggest.max-results=10
# Initial count assigned to a brand-new query on first submission
suggest.new-query-initial-count=1

# ---------------------------------------------------------------------
# Trending / ranking configuration
# finalScore = alpha * normalizedPopularity + (1-alpha) * decayedRecency
# decay half-life controls how fast a recent burst loses weight.
# ---------------------------------------------------------------------
trending.alpha=0.5
trending.decay-half-life-seconds=3600
trending.size=10
trending.recompute-interval-ms=15000

# ---------------------------------------------------------------------
# Batch-write subsystem (Redis Streams)
# ---------------------------------------------------------------------
batch.stream-key=search-events
batch.consumer-group=batch-writers
batch.consumer-name=consumer-1
batch.flush-threshold=500
batch.flush-interval-ms=5000
batch.poll-count=256
batch.poll-block-ms=2000

# ---------------------------------------------------------------------
# Dataset loading: load the CSV into Postgres on startup if table is empty
# ---------------------------------------------------------------------
dataset.load-on-startup=true
# Full 120k dataset (meets the >=100k requirement). Swap to data/sample_queries.csv
# for a fast smoke test, or to a file: path for an external dataset.
dataset.csv-path=classpath:data/queries.csv

# ---------------------------------------------------------------------
# Actuator
# ---------------------------------------------------------------------
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# CORS origin for the Vite dev server
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000
