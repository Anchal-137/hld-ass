server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve the SPA; fall back to index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy the API paths to the backend container. Same-origin from the
    # browser's perspective, so no CORS needed in the Docker setup.
    location ~ ^/(suggest|search|trending|cache|stats) {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
